# argocd/eso.yaml
#
# External Secrets Operator (ESO) — installed cluster-wide, configured to
# read from GCP Secret Manager using Workload Identity.
#
# Why ESO?
#   ArgoCD's internal Go OCI client uses Basic Auth (username + password) for
#   OCI registries. GAR accepts Basic Auth only with a full SA JSON key as the
#   password. ESO syncs that key from Secret Manager into the argocd namespace
#   automatically, so no key material ever lives in Git.
#
# How it works:
#   1. ESO runs in the external-secrets namespace under the 'external-secrets' K8s SA.
#   2. The Helm install annotates that SA with iam.gke.io/gcp-service-account so GKE
#      WIF binds it → hippo-dev-cluster-eso GCP SA (WIF binding declared in wif.yml).
#   3. ESO uses its pod's ambient ADC token (GKE metadata server) — no explicit auth
#      config in the ClusterSecretStore, no STS token exchange required.
#   4. Terraform grants the ESO GCP SA secretAccessor on the specific Secret Manager
#      secret holding the ArgoCD GAR SA key (inlined in environments/dev/main.tf).
#   5. ExternalSecret (argocd-gar-external-secret.yaml) declares what to fetch
#      and where to write it in the argocd namespace.
#
# Applied by: scripts/setup-argocd.sh (step 4, before argocd-gar-external-secret.yaml)
# Prerequisites: `make apply-dev` in hippo_cloud must have run first so the
#   ESO GCP SA, WIF binding, and Secret Manager secret exist before this is applied.
#   The SA key must also be manually uploaded (org policy blocks Terraform key creation)
#   — see first_time_setup.md Step 3.

---
# 1. Install ESO from the upstream stable Helm chart via a manifest install.
#    The setup script applies the upstream install URL directly; this comment
#    documents the version pinned in setup-argocd.sh for auditability.
#    Current pin: external-secrets 2.0.x (stable channel).
#    See: https://external-secrets.io/latest/introduction/getting-started/

---
# 2. ClusterSecretStore: tells ESO how to authenticate to GCP Secret Manager.
#    No explicit auth block — ESO uses its pod's ambient ADC token via the GKE
#    metadata server. The ESO K8s SA is annotated with the GCP SA email
#    (iam.gke.io/gcp-service-account) and GKE WIF binds it automatically.
#    This is the standard GKE WIF flow: no STS token exchange config needed.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: project-ec2467ed-84cd-4898-b5b
