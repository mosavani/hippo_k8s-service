# argocd/argocd-gar-external-secret.yaml
#
# ExternalSecret: registers the GAR OCI Helm registry with ArgoCD.
#
# Auth is handled by docker-credential-gcr (wired into argocd-repo-server
# via argocd-repo-server-wi.yaml) — no username/password needed here.
# ESO still manages this Secret so ArgoCD knows the registry URL and that
# it is an OCI Helm source (enableOCI: true).
#
# secret-type: repo-creds  → prefix-match credential template.
# ArgoCD applies this to any repoURL starting with the url value.
#
# Applied by: scripts/setup-argocd.sh (step 4, after eso.yaml)

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-gar-repo-creds
  namespace: argocd
spec:
  # ESO still needs a data source — fetch a dummy value or reuse the key.
  # We keep the Secret Manager ref so ESO has something to sync and the
  # Secret stays ESO-owned (prevents ArgoCD from managing it directly).
  refreshInterval: 1h

  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore

  target:
    name: argocd-gar-repo-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: helm
        url: "oci://us-central1-docker.pkg.dev/project-ec2467ed-84cd-4898-b5b/hippo-helm-charts"
        enableOCI: "true"
        # No username/password — docker-credential-gcr handles auth via WIF ambient token

  data:
    - secretKey: garKeyJson
      remoteRef:
        key: hippo-dev-cluster-argocd-gar-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
