# argocd/argocd-gar-external-secret.yaml
#
# ExternalSecret: syncs the ArgoCD GAR SA key from GCP Secret Manager into
# the argocd namespace as argocd-gar-repo-creds.
#
# ArgoCD reads this Secret as a named repository credential:
#   - type: helm + enableOCI: "true"  → OCI Helm chart registry
#   - username: _json_key             → GAR Basic Auth username for SA key auth
#   - password: <full SA key JSON>    → ESO populates this from Secret Manager
#
# The Secret Manager secret name (hippo-dev-cluster-argocd-gar-key) is created
# by the argocd-gar-key Terraform module in hippo_cloud.
#
# Sync interval: 1h — well within the SA key's indefinite validity. ESO will
# detect if the secret version changes (e.g. after key rotation via Terraform)
# and update the K8s Secret automatically.
#
# Applied by: scripts/setup-argocd.sh (step 7, after eso.yaml)

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-gar-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore

  target:
    name: argocd-gar-repo-creds
    creationPolicy: Owner  # ESO owns this Secret; deleting the ExternalSecret deletes the Secret
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: helm
        name: hippo-helm-charts-gar
        url: "oci://us-central1-docker.pkg.dev/project-ec2467ed-84cd-4898-b5b/hippo-helm-charts"
        enableOCI: "true"
        username: _json_key
        # password is populated from Secret Manager — the full SA key JSON string
        password: "{{ .garKeyJson }}"

  data:
    - secretKey: garKeyJson
      remoteRef:
        key: hippo-dev-cluster-argocd-gar-key  # Secret Manager secret ID from Terraform output
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
