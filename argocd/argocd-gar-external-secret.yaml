# argocd/argocd-gar-external-secret.yaml
#
# Syncs the ArgoCD-repo GCP SA JSON key from Secret Manager into an ArgoCD
# repository credential Secret so ArgoCD can pull OCI Helm charts from GAR.
#
# Auth flow:
#   ESO (ClusterSecretStore, ambient ADC via WIF)
#     ── reads ──► hippo-dev-cluster-argocd-gar-key (Secret Manager)
#                           ↓
#                 argocd-gar-repo-creds K8s Secret
#                 username: _json_key
#                 password: <SA JSON key>
#                           ↓
#                 ArgoCD go-containerregistry
#                 Basic Auth → token exchange → GAR OCI
#
# Credential template URL prefix-matches the OCI repoURL in applicationset.yaml.
# ArgoCD v3 requires the chart artifact name to be part of repoURL — the creds
# template URL (without the chart name suffix) still prefix-matches correctly.

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-gar-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore

  target:
    name: argocd-gar-repo-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        url: "oci://us-central1-docker.pkg.dev/project-ec2467ed-84cd-4898-b5b/hippo-helm-charts"
        type: helm
        enableOCI: "true"
        username: _json_key
        password: "{{ .garKeyJson }}"

  data:
    - secretKey: garKeyJson
      remoteRef:
        key: hippo-dev-cluster-argocd-gar-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
