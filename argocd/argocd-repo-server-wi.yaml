# argocd/argocd-repo-server-wi.yaml
#
# Annotates the argocd-repo-server K8s SA with the eso GCP SA so the
# GCRAccessToken generator can use it to obtain a fresh OAuth2 token for GAR.
#
# The eso GCP SA has roles/artifactregistry.reader (declared in wif.yml).
# GCRAccessToken generator is namespace-scoped and looks for the SA in the
# argocd namespace — so we annotate argocd-repo-server SA (not the ESO SA).

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-repo-server
  namespace: argocd
  annotations:
    iam.gke.io/gcp-service-account: hippo-dev-cluster-argocd-repo@project-ec2467ed-84cd-4898-b5b.iam.gserviceaccount.com
