# argocd/argocd-repo-server-wi.yaml
#
# Annotates the argocd-repo-server K8s SA with its WIF-bound GCP SA.
#
# The GCP SA (hippo-dev-cluster-argocd-repo) has roles/artifactregistry.reader
# and is bound to this K8s SA via Workload Identity (declared in wif.yml).
#
# Applied by: ArgoCD self-manage (hippo-platform App of Apps watches argocd/).
# Note: current OCI auth uses _json_key via ESO — this annotation is present
# for completeness and potential future use of ambient WIF-based auth.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-repo-server
  namespace: argocd
  annotations:
    iam.gke.io/gcp-service-account: hippo-dev-cluster-argocd-repo@project-ec2467ed-84cd-4898-b5b.iam.gserviceaccount.com
