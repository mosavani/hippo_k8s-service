# argocd/argocd-repo-server-wi.yaml
#
# Placeholder for the argocd-gar-repo-creds repository Secret.
#
# This Secret is now fully managed by External Secrets Operator (ESO).
# See: argocd/argocd-gar-external-secret.yaml
#
# ESO creates and owns this Secret — do NOT define it here or ArgoCD's
# server-side apply will conflict with ESO's ownership annotation.
# This file is kept to document the auth architecture and is applied
# by setup-argocd.sh only to ensure the namespace exists before ESO runs.
#
# Auth flow:
#   GCP Secret Manager (SA key JSON)
#     ──ESO (WIF)──►  argocd-gar-repo-creds K8s Secret
#                           ↓
#                     ArgoCD repo-server
#                     username: _json_key
#                     password: <full SA key JSON>
#                           ↓
#                     GAR Basic Auth → pulls OCI Helm chart
#
# GCP resources managed by Terraform in hippo_cloud:
#   - GCP SA:            hippo-dev-cluster-argocd-gar (artifactregistry.reader)
#   - SA key:            stored in Secret Manager as hippo-dev-cluster-argocd-gar-key
#   - ESO GCP SA:        hippo-dev-cluster-eso (secretmanager.secretAccessor on above)
#   - WIF binding:       wif.yml → workloads[name=eso]
