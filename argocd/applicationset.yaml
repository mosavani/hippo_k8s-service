# argocd/applicationset.yaml
#
# Platform-owned ApplicationSet — generates one ArgoCD Application per
# component per environment by reading each service repo's
# service-settings/components-manifest.yml.
#
# Developer contract: edit components-manifest.yml in your service repo only.
# Platform contract:  edit this file and argocd/chart-config.yaml only.
#
# Chart version and GAR coordinates live centrally in argocd/chart-config.yaml
# in this repo. The release workflow updates chart_version automatically on
# every semver tag push — service repos never need to reference chart versions.
#
# Prerequisites:
#   - ArgoCD >= 2.6 (multi-source Applications + ApplicationSet support)
#   - Run once per cluster: ./scripts/setup-argocd.sh
#
# To onboard a new service: add it to the git generator list below and
# add components-manifest.yml to the service repo. No other changes needed.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hippo-services
  namespace: argocd
spec:
  # ── Generators ──────────────────────────────────────────────────────────────
  # Matrix: cross-product of (service repos × environments).
  # chart-config.yaml is read via a separate git generator and merged in
  # through a wrapping matrix so chart_version is available in the template.
  generators:
    - matrix:
        generators:
          # 1. Read chart version + GAR config centrally from this repo
          - git:
              repoURL: https://github.com/mosavani/hippo_k8s-service.git
              revision: HEAD
              files:
                - path: argocd/chart-config.yaml

          # 2. Inner matrix: service repos × environments
          - matrix:
              generators:
                # 2a. Pull components-manifest.yml from every registered service repo
                - git:
                    repoURL: https://github.com/mosavani/hippo_hello_world.git
                    revision: HEAD
                    files:
                      - path: service-settings/components-manifest.yml

                # 2b. Enumerate environments
                - list:
                    elements:
                      - env: dev
                        server: https://kubernetes.default.svc
                        syncAutomated: "true"
                      - env: prod
                        server: https://kubernetes.default.svc
                        syncAutomated: "false"

  # ── Application template ───────────────────────────────────────────────────
  template:
    metadata:
      # One Application per component per env: e.g. hippo-hello-world-dev
      name: "{{components.name}}-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: "{{components.name}}"
        hippo/env: "{{env}}"
        hippo/chart-version: "{{chart_version}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: default

      # Multi-source: chart comes from GAR OCI, values come from the service git repo.
      # $values ref makes the service repo available to valueFiles in source 1.
      sources:
        # Source 1 — Helm chart from GAR OCI registry (version from chart-config.yaml)
        - repoURL: "oci://{{gar_location}}-docker.pkg.dev/{{gar_project_id}}/{{gar_repository}}"
          chart: hippo-service
          targetRevision: "{{chart_version}}"
          helm:
            releaseName: "{{components.name}}"
            valueFiles:
              - $values/{{components.helm_chart_default_values_files[0]}}
            values: |
              global:
                env: {{env}}
                componentName: {{components.name}}
              image:
                repository: {{gar_location}}-docker.pkg.dev/{{gar_project_id}}/hippo-images/{{components.name}}
                tag: {{components.image_tag}}

        # Source 2 — Service git repo, used only to supply values files ($values ref)
        - repoURL: "{{components.repo_url}}"
          targetRevision: "{{components.target_revision}}"
          ref: values

      destination:
        server: "{{server}}"
        namespace: "hippo-{{components.name}}-{{env}}"

      syncPolicy:
        # Base: manual sync (safe default, including prod).
        # Dev gets automated sync via templatePatch below.
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

  # templatePatch: overlay automated sync for dev only.
  # prune/selfHeal are booleans — cannot be interpolated via {{}} in the base
  # template because the ApplicationSet webhook validates types at apply time.
  templatePatch: |
    {{- if eq syncAutomated "true" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}

  # Prevent accidental deletion of the ApplicationSet
  syncPolicy:
    preserveResourcesOnDeletion: true
