# argocd/applicationset.yaml
#
# Platform-owned ApplicationSet — generates one ArgoCD Application per
# component per environment.
#
# Design: matrix of exactly two generators (ArgoCD limit):
#   1. git: reads components-manifest.yml from each service repo
#   2. list: environments + chart config (version, GAR coords)
#
# Chart version and GAR coordinates are embedded in the list elements.
# The release workflow in hippo_k8s-service updates chart_version here
# on every semver tag push.
#
# To onboard a new service: add a git generator entry pointing to the
# new repo's components-manifest.yml. No other changes needed.
#
# Prerequisites:
#   - ArgoCD >= 2.6
#   - Run once per cluster: ./scripts/setup-argocd.sh

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hippo-services
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # Generator 1: per-service manifest.
          # Each registered service repo contributes one file.
          # Keys available in template: app_name, repo_url, target_revision,
          #                             image_tag, default_values, prod_values,
          #                             deployment_type (rolling | progressive)
          - git:
              repoURL: https://github.com/mosavani/hippo_hello_world.git
              revision: HEAD
              files:
                - path: service-settings/components-manifest.yml

          # Generator 2: environments with chart config embedded.
          # chart_version is updated automatically by the hippo_k8s-service
          # release workflow on every semver tag push.
          # prod is intentionally omitted — it runs on a separate prod cluster
          # with its own ApplicationSet applied there.
          - list:
              elements:
                - env: dev
                  server: https://kubernetes.default.svc
                  cluster_name: "hippo-dev-cluster"
                  chart_version: "0.0.24"
                  gar_location: "us-central1"
                  gar_project_id: "project-ec2467ed-84cd-4898-b5b"
                  gar_repository: "hippo-helm-charts"
                  gar_image_repository: "hippo-images"

  template:
    metadata:
      name: "{{app_name}}-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: "{{app_name}}"
        hippo/env: "{{env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: default

      sources:
        # Chart from GAR OCI — version and registry from list elements above.
        # repoURL must include the chart artifact name (ArgoCD v3 does not append
        # the chart field to the OCI v2 API path — it uses repoURL as-is).
        - repoURL: "oci://{{gar_location}}-docker.pkg.dev/{{gar_project_id}}/{{gar_repository}}/hippo-service"
          chart: hippo-service
          targetRevision: "{{chart_version}}"
          helm:
            releaseName: "{{app_name}}"
            valueFiles:
              - $values/{{default_values}}
            values: |
              global:
                env: {{env}}
                componentName: {{app_name}}
                clusterName: {{cluster_name}}
              image:
                repository: {{gar_location}}-docker.pkg.dev/{{gar_project_id}}/{{gar_image_repository}}/{{app_name}}
                tag: {{image_tag}}
              rollout:
                enabled: '{{deployment_type}}'

        # Service git repo — supplies values files via $values ref
        - repoURL: "{{repo_url}}"
          targetRevision: "{{target_revision}}"
          ref: values

      destination:
        server: "{{server}}"
        namespace: "svc-{{app_name}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

  syncPolicy:
    preserveResourcesOnDeletion: true
