# tests/values/rollout-canary-argocd.yml
# Simulates the ArgoCD ApplicationSet inline values injection path where
# deployment_type=progressive in components-manifest.yml causes ArgoCD to
# inject rollout.enabled as the string "progressive" via:
#   enabled: '{{deployment_type}}'
# This test guards against the type comparison error and ensures
# "progressive" is treated identically to boolean true for rollout activation.
image:
  repository: gcr.io/my-project/hippo-api
  tag: "2.1.0"

global:
  env: dev
  componentName: hippo-api

service:
  replicaCount: 2
  port: 80
  targetPort: 8080
  liveness:
    enabled: true
    path: /health
  readiness:
    enabled: true
    path: /ready

# rollout.enabled as string "progressive" — exactly what ArgoCD injects via:
#   enabled: '{{deployment_type}}'
rollout:
  enabled: "progressive"
  autoPromote: "false"
  maxSurge: 25
  maxUnavailable: 0
  progressDeadlineSeconds: 600
  progressDeadlineAbort: true
  analysis:
    defaultCpuUsage:
      threshold: 70
    defaultMemoryUtilization:
      threshold: 80
  steps:
    - setWeight: 10
    - pause:
        duration: 2m
    - setWeight: 25
    - pause:
        duration: 2m
    - setWeight: 50
    - pause:
        duration: 3m
    - setWeight: 75
    - pause:
        duration: 3m
    - setWeight: 100
    - pause:
        duration: 2m

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50

pdb:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity: soft

networkPolicy:
  enabled: true
  ingressNamespace: kube-system

metrics:
  enabled: true
  port: 8080
  path: /metrics
  interval: 30s

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
