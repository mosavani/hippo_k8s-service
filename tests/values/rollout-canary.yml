# tests/values/rollout-canary.yml
# Argo Rollout canary with HPA, analysis (CPU + memory), and PDB — rollout replaces Deployment.
# Emergency direct deploy: kubectl argo rollouts promote --full svc-hippo-api -n svc-hippo-api
image:
  repository: gcr.io/my-project/hippo-api
  tag: "2.1.0"

global:
  env: prod
  componentName: hippo-api

service:
  replicaCount: 4
  port: 80
  targetPort: 8080
  liveness:
    enabled: true
    path: /health
  readiness:
    enabled: true
    path: /ready

rollout:
  enabled: true
  autoPromote: false
  maxSurge: 25
  maxUnavailable: 0
  progressDeadlineSeconds: 600
  progressDeadlineAbort: true

  # Analysis — automated health gates injected after every setWeight step.
  # An AnalysisTemplate is created per enabled threshold and runs 3 checks
  # (every 30s) before the rollout proceeds. Breach → automatic abort + rollback.
  # Emergency bypass: kubectl argo rollouts promote --full <name> -n <ns>
  analysis:
    # CPU utilisation of canary pods as % of CPU request (0–100).
    defaultCpuUsage:
      threshold: 70
    # Memory working-set of canary pods as % of memory request (0–100).
    defaultMemoryUtilization:
      threshold: 80

  # Progressive canary steps — analysis is auto-injected after every setWeight.
  steps:
    - setWeight: 10
    - pause:
        duration: 2m
    - setWeight: 25
    - pause:
        duration: 2m
    - setWeight: 50
    - pause:
        duration: 3m
    - setWeight: 75
    - pause:
        duration: 3m
    - setWeight: 100
    - pause:
        duration: 2m

hpa:
  enabled: true
  minReplicas: 4
  maxReplicas: 50
  targetCPUUtilizationPercentage: 60

pdb:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinity: hard

ingress:
  enabled: true
  className: "gce"
  annotations:
    kubernetes.io/ingress.allow-http: "false"
  host: api.hippo.example.com
  path: /

networkPolicy:
  enabled: true
  ingressNamespace: kube-system

metrics:
  enabled: true
  port: 8080
  path: /metrics
  interval: 30s

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 1Gi
