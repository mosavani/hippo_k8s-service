# ============================================================
# hippo-service Helm Chart — Default Values
# ============================================================
# Override per component via:
#   service-settings/default/<component>-values.yml     (non-prod)
#   service-settings/overrides/<component>-values.yml   (prod)
# ============================================================

# ---------------------------------------------------------------------------
# Global — set by the pipeline / cluster config
# ---------------------------------------------------------------------------
global:
  env: dev
  componentName: ""
  clusterName: ""
  # Pipeline can force a specific replica count (0 = use service.replicaCount)
  replicaCountOverride: 0

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  replicaCount: 2
  revisionHistoryLimit: 3

  # Kubernetes Service type: ClusterIP | LoadBalancer
  # Use ClusterIP when Ingress is enabled, LoadBalancer for direct L4 access.
  type: ClusterIP

  port: 80           # Service port
  targetPort: 8080   # Container port

  # Liveness probe
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  # Readiness probe
  readiness:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Rolling-update strategy
  maxSurge: 1
  maxUnavailable: 0

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler
# ---------------------------------------------------------------------------
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # Optional memory target (leave empty to disable)
  targetMemoryUtilizationPercentage: ""
  # Seconds before scaling down (prevents thrashing)
  scaleDownStabilizationWindowSeconds: 300

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
pdb:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------------
# Ingress (GKE HTTP(S) LoadBalancer)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: "gce"   # gce = GKE external, gce-internal = GKE internal
  annotations: {}
    # kubernetes.io/ingress.allow-http: "false"
    # networking.gke.io/managed-certificates: my-cert
    # kubernetes.io/ingress.global-static-ip-name: my-static-ip
  host: ""
  path: /
  pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Node Affinity / Pod Anti-Affinity
# ---------------------------------------------------------------------------
affinity:
  # Pod anti-affinity: soft | hard | none
  # soft — prefer different nodes (best-effort)
  # hard — require different nodes (blocks scheduling if not possible)
  podAntiAffinity: soft
  # Optional node pool pin, e.g.:
  #   cloud.google.com/gke-nodepool: high-mem-pool
  nodePool: ""

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Namespaces allowed to send inbound traffic (by label).
  # Default: only pods in the same namespace.
  # Example: allow from ingress-nginx namespace →
  #   ingressNamespace: ingress-nginx
  ingressNamespace: ""

# ---------------------------------------------------------------------------
# Environment Variables
# ---------------------------------------------------------------------------
env: []
# - name: MY_VAR
#   value: "value"

podAnnotations: {}
podLabels: {}
deploymentAnnotations: {}

# ---------------------------------------------------------------------------
# Metrics (GKE Managed Prometheus / PodMonitoring)
# ---------------------------------------------------------------------------
metrics:
  # Enables a PodMonitoring resource so GKE Managed Prometheus scrapes /metrics.
  # Requires the gmp-system collector to be running on the cluster (enabled by
  # default on GKE clusters with Managed Prometheus). Scraped metrics are
  # available in GCP Monitoring → Metrics Explorer under prometheus.googleapis.com.
  enabled: true
  path: /metrics
  port: http          # must match the Service port name
  interval: 30s

# ---------------------------------------------------------------------------
# Argo Rollouts (canary deployments)
# ---------------------------------------------------------------------------
# Set rollout.enabled: true to replace the Deployment with an Argo Rollout.
# Requires the Argo Rollouts controller to be installed in the cluster.
#
# When enabled:
#   - deployment.yaml is suppressed
#   - rollout.yaml + service-rollout.yaml are rendered (stable + canary Services)
#   - hpa.yaml targets the Rollout instead of the Deployment
#
rollout:
  enabled: false

  # autoPromote: true skips all steps and promotes immediately (useful for dev).
  autoPromote: false

  # Percentage caps on surge / unavailable pods during a rollout.
  maxSurge: 25
  maxUnavailable: 0

  # Abort the rollout if it has not progressed within this window (seconds).
  progressDeadlineSeconds: 600
  progressDeadlineAbort: true

  # ---------------------------------------------------------------------------
  # Analysis — automated health checks injected after every setWeight step.
  #
  # When a threshold is set, an AnalysisTemplate is created in the namespace
  # and an `analysis` step is automatically injected after every `setWeight`
  # in the steps list below. If the metric breaches the threshold the rollout
  # is aborted and the stable version receives all traffic.
  #
  # Metrics are queried from the GMP Prometheus frontend (gmp-system/frontend)
  # which exposes app metrics scraped via PodMonitoring — no extra Prometheus
  # installation required. Raw container CPU/memory (cAdvisor) metrics require
  # an in-cluster Prometheus (kube-prometheus-stack) — see docs/architecture.md.
  #
  # Set threshold to "" (empty string) or omit the key to disable that check.
  # ---------------------------------------------------------------------------
  analysis:
    # CPU utilisation of canary pods as % of their CPU request (0–100).
    # Rollout aborts if average canary CPU exceeds this value.
    # Metric: container_cpu_usage_seconds_total / kubernetes.io/container/cpu/request_cores
    # Queried from Cloud Monitoring via GMP frontend (gmp-system/frontend:9090).
    defaultCpuUsage:
      threshold: 70

    # Memory working-set of canary pods as % of their memory request (0–100).
    # Rollout aborts if average canary memory exceeds this value.
    # Metric: container_memory_working_set_bytes / kubernetes.io/container/memory/request_bytes
    # Omit threshold to disable.
    defaultMemoryUtilization:
      threshold: 80

  # Canary steps — executed in order.
  # Supported step types: setWeight | pause | analysis
  # If rollout.analysis thresholds are set, an `analysis` step is automatically
  # injected after every setWeight — no need to add them manually.
  # Leave empty [] when autoPromote: true.
  steps:
    - setWeight: 10
    - pause:
        duration: 2m
    - setWeight: 25
    - pause:
        duration: 2m
    - setWeight: 50
    - pause:
        duration: 3m
    - setWeight: 75
    - pause:
        duration: 3m
    - setWeight: 100
    - pause:
        duration: 2m
