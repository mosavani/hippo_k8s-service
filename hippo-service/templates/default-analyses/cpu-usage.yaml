{{/*
default-analyses/cpu-usage.yaml

AnalysisTemplate: cpu-usage

Queries Cloud Monitoring via the GMP Prometheus-compatible frontend.

Metric: kubernetes_io:container_cpu_request_utilization
  - Pre-computed GAUGE: CPU usage / CPU request (0.0 = 0%, 1.0 = 100%)
  - Label names use Cloud Monitoring convention: namespace_name, container_name, pod_name

Canary scoping: Argo Rollouts injects the canary ReplicaSet pod-template-hash via
  args.canary-hash so the query measures only canary pods, not stable pods.
  pod_name=~"<fullname>-<hash>-.*" matches only the canary ReplicaSet pods.

threshold: CPU utilisation % of request (0–100). Rollout aborts if canary pods
  average above this. Maps to rollout.analysis.defaultCpuUsage.threshold.

Disable per-service with:
  rollout:
    analysis:
      defaultCpuUsage: {}
*/}}
{{- if and (include "hippo.rollout.enabled" .) .Values.rollout.analysis.defaultCpuUsage.threshold }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "hippo.fullname" . }}-cpu-usage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hippo.labels" . | nindent 4 }}
spec:
  args:
    - name: canary-hash
  metrics:
    - name: cpu-usage
      interval: 30s
      successCondition: result[0] < {{ .Values.rollout.analysis.defaultCpuUsage.threshold }}
      failureLimit: 0
      count: 3
      provider:
        prometheus:
          address: http://frontend.gmp-public.svc.cluster.local:9090
          query: |
            100 * avg(
              kubernetes_io:container_cpu_request_utilization{
                monitored_resource="k8s_container",
                cluster_name="{{ .Values.global.clusterName }}",
                namespace_name="{{ .Release.Namespace }}",
                container_name="{{ include "hippo.name" . }}",
                pod_name=~"{{ include "hippo.fullname" . }}-{{`{{args.canary-hash}}`}}-.*"
              }
            )
{{- end }}
