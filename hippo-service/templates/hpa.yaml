{{/*
hpa.yaml — Horizontal Pod Autoscaler.

Enabled via hpa.enabled: true.
Supports CPU and/or memory targets.

Scale-up/down asymmetry:
  - targetCPUUtilizationPercentage  — scale UP threshold (e.g. 50%)
  - scaleDownCPUThreshold           — scale DOWN threshold (e.g. 20%)
    When set, a second Resource metric is added at the lower threshold.
    HPA evaluates both metrics and picks the one recommending the MOST
    replicas (Max selectPolicy on metrics). For scale-down, selectPolicy: Min
    on the behavior policies means the most conservative removal rate wins.
    Net effect: HPA will not scale down unless CPU drops below BOTH thresholds,
    i.e. it must fall to scaleDownCPUThreshold before replicas are removed.
  - scaleDownStabilizationWindowSeconds — how long CPU must stay below
    threshold before a scale-down is triggered (default 300s).
*/}}
{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "hippo.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hippo.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    {{- if include "hippo.rollout.enabled" . }}
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    {{- else }}
    apiVersion: apps/v1
    kind: Deployment
    {{- end }}
    name: {{ include "hippo.fullname" . }}
  minReplicas: {{ .Values.hpa.minReplicas | default 2 }}
  maxReplicas: {{ .Values.hpa.maxReplicas | default 10 }}
  metrics:
    # Scale UP: add replicas when average CPU exceeds this threshold.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUtilizationPercentage | default 70 }}
    {{- if .Values.hpa.scaleDownCPUThreshold }}
    # Scale DOWN guard: a second CPU metric at the lower threshold.
    # HPA takes the maximum replica count across all metrics, so it will
    # not scale down until CPU drops below this lower value — even if it
    # is already under the scale-up threshold above.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.scaleDownCPUThreshold }}
    {{- end }}
    {{- if .Values.hpa.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      # Require CPU to stay below threshold for this long before scaling down.
      # Prevents flapping when load is bursty.
      stabilizationWindowSeconds: {{ .Values.hpa.scaleDownStabilizationWindowSeconds | default 300 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      {{- if .Values.hpa.scaleDownCPUThreshold }}
      # Min: when multiple policies exist, remove the fewest pods.
      selectPolicy: Min
      {{- end }}
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
{{- end }}
